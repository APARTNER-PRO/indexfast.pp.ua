; ══════════════════════════════════════════════
;  IndexFast — OpenServer Panel (Windows)
;  Файл: помісти в папку OpenServer\userdata\cron\
;  або додай рядки в існуючий cron конфіг
;
;  Синтаксис OpenServer cron:
;  Name = Секунди Хвилини Години ДеньМісяця Місяць ДеньТижня Рік
;         "%COMSPEC%" /schedule "команда"
;
;  %COMSPEC%   = C:\Windows\System32\cmd.exe
;  {php_bin}   = шлях до php.exe (замін на свій)
;  {base_dir}  = корінь OpenServer (напр. C:\OpenServer)
; ══════════════════════════════════════════════

; ── Воркер черги — кожну хвилину
Worker = * * * * * * * "%COMSPEC%" /schedule "{php_bin}\php.exe {base_dir}\domains\indexfast.local\worker\worker.php"

; ── Очищення старих jobs — щодня о 03:00
Cleanup = 0 0 3 * * * * "%COMSPEC%" /schedule "{php_bin}\php.exe {base_dir}\domains\indexfast.local\worker\cleanup.php"

; ── Health check — кожні 5 хвилин
Health = 0 */5 * * * * * "%COMSPEC%" /schedule "{php_bin}\php.exe {base_dir}\domains\indexfast.local\worker\health.php"
